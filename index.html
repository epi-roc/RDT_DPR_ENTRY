<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDT DPR ENTRY FORM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    :root { --epi-black: #000; --epi-yellow: #FFCE00; --bg: #0c0c0c; --card: #181818; --text: #fff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }

    header { background-color: #1a1a1a; padding: 10px 20px; border-bottom: 3px solid var(--epi-yellow); }
    .header-container { display: flex; align-items: center; justify-content: space-between; max-width: 1200px; margin: 0 auto; }
    .logo-wrapper { height: 40px; width: 120px; display: flex; align-items: center; }
    .logo { max-height: 40px; max-width: 100%; object-fit: contain; }
    .header-title { color: #ffffff; font-size: 1.5rem; font-weight: bold; text-transform: uppercase; text-align: center; flex-grow: 1; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

    .control-bar { background: #111; padding: 15px 20px; display: grid; gap: 12px; border-bottom: 1px solid #222; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); align-items: end; }
    .item { display: flex; flex-direction: column; gap: 4px; }
    .item label { font-size: 0.65rem; font-weight: 800; color: var(--epi-yellow); text-transform: uppercase; }
    .item select, .item input { background: #262626; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; font-size: 0.85rem; width: 100%; outline: none; }
    .item select:focus, .item input:focus { border-color: var(--epi-yellow); }

    .sync-btn { background: var(--epi-yellow); color: #000; border: none; padding: 10px; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
    .sync-btn:hover { background: #e6b800; }

    main { padding: 25px 20px; max-width: 98vw; margin: 0 auto; display: none; }
    
    /* 🚨 NEW: ACCORDION (FOLD/UNFOLD) STYLES 🚨 */
    .table-wrapper { background: var(--card); border-radius: 6px; margin-bottom: 20px; }
    
    .shift-accordion { background: #1a1a1a; border: 1px solid #333; border-left: 5px solid var(--epi-yellow); color: #fff; padding: 12px 20px; font-size: 1.1rem; font-weight: 900; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; margin-bottom: 5px; text-transform: uppercase; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    .shift-accordion:hover { background: #222; border-left-color: #fff; }
    .shift-accordion i.fa-chevron-down { transition: transform 0.3s ease; color: var(--epi-yellow); }
    .shift-accordion.active i.fa-chevron-down { transform: rotate(180deg); color: #fff; }
    
    .shift-group { display: none; border: 1px solid #333; background: #0c0c0c; margin-bottom: 20px; border-radius: 0 0 4px 4px; border-top: none; overflow-x: auto; }
    .shift-group.active { display: block; animation: slideDown 0.3s ease-in-out; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

    .t-header-row { display: flex; gap: 8px; padding: 10px; background: #222; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: #aaa; border-bottom: 2px solid var(--epi-yellow); position: sticky; top: 0; z-index: 10; min-width: max-content; }
    .t-row { display: flex; gap: 8px; padding: 8px 10px; border-bottom: 1px solid #222; align-items: stretch; background: #111; transition: 0.3s; min-width: max-content; }
    .t-row:hover { background: #1a1a1a; }
    
    .row-loaded { border-left: 4px solid #00E676; background: #0a1c0a; }

    .t-fleet { width: 180px; flex-shrink: 0; display: flex; align-items: center; font-weight: bold; color: var(--epi-yellow); font-size: 0.9rem; border-right: 1px solid #333; padding-right: 10px; }
    .t-shift { width: 80px; flex-shrink: 0; display: flex; align-items: center; font-weight: bold; }
    .t-loc { width: 140px; flex-shrink: 0; }
    .t-status { width: 120px; flex-shrink: 0; border-right: 1px dashed #333; padding-right: 10px; }

    .t-row input, .t-row select { background: #000; color: #fff; border: 1px solid #444; padding: 6px; font-size: 0.8rem; border-radius: 3px; width: 100%; outline: none; }
    .t-row input:focus, .t-row select:focus { border-color: var(--epi-yellow); }
    .t-row input[readonly] { background: #1a1a1a; color: #888; border-color: #333; cursor: not-allowed; }

    .t-drills { display: flex; gap: 5px; flex-wrap: wrap; flex-grow: 1; min-width: 450px; }
    .t-drill-block { display: flex; gap: 4px; align-items: center; background: #000; padding: 4px; border: 1px solid #333; border-radius: 4px; margin-bottom: 4px; }
    
    .t-drill-block select.d-cat { width: 220px; }
    .t-drill-block input.d-dia { width: 60px; }
    .t-drill-block input.d-depth { width: 60px; }
    .t-drill-block input.d-qty { width: 55px; }
    .t-drill-block input.d-metres { width: 70px; }

    .btn-del-table { background: #444; color: #fff; border: none; padding: 6px 10px; border-radius: 3px; cursor: pointer; margin-left: 2px; }
    .btn-del-table:hover { background: #ff4444; }
    .btn-add-table { background: #222; color: var(--epi-yellow); border: 1px dashed var(--epi-yellow); padding: 0 15px; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold; display: flex; align-items: center; justify-content: center; margin-left: 5px; }
    .btn-add-table:hover { background: #333; }
    
    .t-totals-box { display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 0 10px; background:#222; border-radius:4px; margin-left:5px; min-width: 60px; }
    .t-totals-lbl { font-size:0.55rem; color:#aaa; font-weight: bold; }

    .primary-btn { background: #00E676; color: #000; border: none; padding: 15px; border-radius: 6px; font-weight: 900; font-size: 1rem; cursor: pointer; width: 100%; max-width: 400px; margin: 20px auto; display: block; text-transform: uppercase; }
    
    .table-wrapper::-webkit-scrollbar { height: 10px; }
    .table-wrapper::-webkit-scrollbar-track { background: #111; }
    .table-wrapper::-webkit-scrollbar-thumb { background: #444; border-radius: 5px; }

    /* Modal Styles */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9000; padding: 20px; }
    .modal-content { background: #111; border: 1px solid #444; border-top: 4px solid var(--epi-yellow); border-radius: 8px; width: 100%; max-width: 700px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
    .modal-header { padding: 15px 20px; background: #000; font-weight: bold; font-size: 1.2rem; color: var(--epi-yellow); text-transform: uppercase; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    .modal-close-btn { background: transparent; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
    .modal-close-btn:hover { color: #ff4444; transform: scale(1.1); }
    .modal-body { padding: 20px; overflow-y: auto; flex-grow: 1; }
    .modal-footer { padding: 15px 20px; background: #000; border-top: 1px solid #333; display: flex; justify-content: flex-end; gap: 10px; }
    
    .summary-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; color: #fff; }
    .summary-table th { background: #222; color: #aaa; padding: 8px; text-align: left; border-bottom: 1px solid #444; text-transform: uppercase; }
    .summary-table td { padding: 8px; border-bottom: 1px solid #222; }
    
    .btn-cancel { background: transparent; border: 1px solid #666; color: #fff; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .btn-confirm { background: var(--epi-yellow); border: none; color: #000; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: 900; text-transform: uppercase; }

    #loader { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: var(--epi-yellow); font-weight: bold; font-size: 1.2rem; }
</style>
</head>
<body onload="initApp()">

<div id="loader"><i class="fas fa-spinner fa-spin fa-2x" style="margin-bottom: 15px;"></i> <span id="load-text">Loading Initial Data...</span></div>

<header>
    <div class="header-container">
        <div class="logo-wrapper"><img src="RDT.png" class="logo" alt="RDT" onerror="this.style.display='none'"></div>
        <div class="header-title">RDT DPR ENTRY FORM</div>
        <div class="logo-wrapper"><img src="Boomer1.png" class="logo" alt="Boomer" onerror="this.style.display='none'"></div>
    </div>
</header>

<div class="control-bar">
    <div class="item"><label>Customer</label><select id="cust" onchange="updateSites()"><option value="">Loading...</option></select></div>
    <div class="item"><label>Work Site</label><select id="site"><option value="">Select</option></select></div>
    <div class="item"><label>Date</label><input type="date" id="date"></div>
    <div class="item"><label>Login ID</label><input type="text" id="user" placeholder="Admin"></div>
    <div class="item"><label>Password</label><input type="password" id="pass" placeholder="••••"></div>
    <div class="item"><button class="sync-btn" onclick="handleSync()"><i class="fas fa-sync" id="icon"></i> SYNC SITE</button></div>
</div>

<main id="main-area">
    <div class="table-wrapper" id="fleet-container">
        </div>
    <button type="button" class="primary-btn" onclick="reviewData()">REVIEW & SUBMIT DPR</button>
</main>

<div class="modal-overlay" id="confirmModal">
    <div class="modal-content">
        <div class="modal-header">
            <span>Confirm Performance Data</span>
            <button class="modal-close-btn" onclick="document.getElementById('confirmModal').style.display='none'" title="Close"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <p style="margin-bottom: 15px; font-size: 0.9rem; color: #ccc;">Verify the drilling totals. Data from ALL shifts will be saved.</p>
            <table class="summary-table">
                <thead>
                    <tr>
                        <th>Fleet & Shift</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Tot Holes</th>
                        <th>Tot Metres</th>
                    </tr>
                </thead>
                <tbody id="summaryBody"></tbody>
            </table>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="document.getElementById('confirmModal').style.display='none'">Edit Data</button>
            <button class="btn-confirm" id="finalSubmitBtn" onclick="executeSubmission()">Confirm & Upload</button>
        </div>
    </div>
</div>

<script>
let dbHierarchy = {};
let globalHoleTypes = [];
let activeFleets = []; 
let savedDPRData = []; 
let pendingPayload = []; 

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzLPst6bC2JxlF93mI04Lwt8YF18qSw2KRfzNgmT5XsqMEZ9VuC-5FbHJUjouks_HaqaA/exec";

async function callServer(data) {
    try {
        const response = await fetch(WEB_APP_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(data) });
        const textResponse = await response.text(); 
        try { return JSON.parse(textResponse); } 
        catch (e) { return { status: "ERROR", message: "Server returned invalid data." }; }
    } catch (error) { return { status: "ERROR", message: "Network connection failed." }; }
}

async function initApp() {
    document.getElementById('date').valueAsDate = new Date();
    const res = await callServer({ action: "getInitialHierarchy" });
    document.getElementById('loader').style.display = 'none';
    
    if (res.status === "SUCCESS") {
        dbHierarchy = res.hierarchy || res.data || {};
        globalHoleTypes = res.holeTypes || []; 
        
        const custSelect = document.getElementById('cust');
        custSelect.innerHTML = '<option value="">-- Select Customer --</option>'; 
        
        Object.keys(dbHierarchy).sort().forEach(c => {
            let cleanC = c.trim();
            let lowerC = cleanC.toLowerCase();
            
            if (!cleanC || cleanC.length <= 2 || /^\d+$/.test(cleanC) || ( /[\/\-]/.test(cleanC) && /\d/.test(cleanC) )) return;
            const invalidWords = ["machine", "fleet", "date", "month", "daily", "report", "location", "status", "shift", "total"];
            if (invalidWords.some(word => lowerC.includes(word))) return;
            
            custSelect.options.add(new Option(cleanC, cleanC));
        });
    } else {
        alert("Failed to load backend hierarchy.");
    }
}

function updateSites() {
    const s = document.getElementById('site');
    s.innerHTML = '<option value="">Select Site</option>';
    const cust = document.getElementById('cust').value;
    if(dbHierarchy[cust]) dbHierarchy[cust].sort().forEach(site => s.options.add(new Option(site, site)));
}

async function handleSync() {
    const icon = document.getElementById('icon');
    try {
        const u = document.getElementById('user').value, p = document.getElementById('pass').value;
        const s = document.getElementById('site').value, c = document.getElementById('cust').value;
        const d = document.getElementById('date').value;
        
        if(!u || !p || !s || !c) return alert("Please fill Customer, Site, Date, and Login credentials.");
        
        icon.classList.add('fa-spin');
        document.getElementById('loader').style.display = 'flex';
        document.getElementById('load-text').innerText = "Syncing Database...";
        
        const res = await callServer({ action: "login", site: s, user: u, pass: p });
        const prevRes = await callServer({ action: "fetchPreviousDPR", site: s, date: d });
        if(prevRes.status === "SUCCESS") savedDPRData = prevRes.data;

        icon.classList.remove('fa-spin');
        document.getElementById('loader').style.display = 'none';

        if(res.status === "SUCCESS") {
            activeFleets = res.fleets || [];
            buildFleetDashboard();
        } else { alert("Sync Error: " + res.message); }
    } catch (err) {
        document.getElementById('loader').style.display = 'none';
        if(icon) icon.classList.remove('fa-spin');
        alert("UI Error: " + err.message);
    }
}

// 🚨 NEW: ACCORDION FOLD/UNFOLD LOGIC 🚨
window.toggleShift = function(shift) {
    const grp = document.getElementById(`group-shift-${shift}`);
    const btn = document.getElementById(`acc-btn-${shift}`);
    
    if (grp.classList.contains('active')) {
        grp.classList.remove('active');
        btn.classList.remove('active');
    } else {
        grp.classList.add('active');
        btn.classList.add('active');
    }
}

function buildFleetDashboard() {
    const container = document.getElementById('fleet-container');
    if (!container) {
        console.error("Critical Error: 'fleet-container' not found!");
        return;
    }
    container.innerHTML = ""; 

    if (activeFleets.length === 0) {
        container.innerHTML = "<h3 style='color:#ff4444; padding:20px;'>No machines assigned to this site.</h3>";
        return;
    }

    const shifts = ['A', 'B', 'C'];

    shifts.forEach(shift => {
        const accBtn = document.createElement('div');
        accBtn.className = `shift-accordion ${shift === 'A' ? 'active' : ''}`;
        accBtn.id = `acc-btn-${shift}`;
        accBtn.onclick = () => toggleShift(shift);
        accBtn.innerHTML = `<span><i class="fas fa-layer-group"></i> ALL FLEETS - SHIFT ${shift}</span> <i class="fas fa-chevron-down"></i>`;
        container.appendChild(accBtn);

        const groupDiv = document.createElement('div');
        groupDiv.className = `shift-group ${shift === 'A' ? 'active' : ''}`;
        groupDiv.id = `group-shift-${shift}`;

        const headerRow = document.createElement('div');
        headerRow.className = "t-header-row";
        headerRow.innerHTML = `
            <div class="t-fleet">Fleet Asset</div>
            <div class="t-shift">Shift</div>
            <div class="t-loc">Location</div>
            <div class="t-status">Status</div>
            <div style="padding-left:5px;">Drilling Data <span style="color:#666; text-transform:none;">(Type, Dia, Qty, Depth, Total)</span></div>
        `;
        groupDiv.appendChild(headerRow);

        activeFleets.forEach(fleet => {
            const shiftArray = fleet.shifts ? fleet.shifts.split(',').map(s => s.trim()) : [];
            if (shiftArray.includes(shift)) {
                const rowId = `fleet-${fleet.id}-shift-${shift}`;
                const locOpts = fleet.locations ? fleet.locations.split(',').map(l => `<option value="${l.trim()}">`).join('') : '';
                const statusOpts = fleet.statuses ? fleet.statuses.split(',').map(s => `<option value="${s.trim()}">${s.trim()}</option>`).join('') : '<option value="WORKING">WORKING</option><option value="BREAKDOWN">BREAKDOWN</option><option value="IDLE">IDLE</option><option value="SERVICE">SERVICE</option>';

                const row = document.createElement('div');
                row.className = "t-row";
                row.id = rowId;
                row.dataset.fleet = fleet.id;
                row.dataset.shift = shift;
                
                row.innerHTML = `
                    <div class="t-fleet">${fleet.id}</div>
                    <div class="t-shift">Shift ${shift}</div>
                    <div class="t-loc"><input list="locs-${rowId}" class="f-loc" placeholder="Select or Type"><datalist id="locs-${rowId}">${locOpts}</datalist></div>
                    <div class="t-status"><select class="f-status"><option value="">- Status -</option>${statusOpts}</select></div>
                    <div class="t-drills" id="drills-${rowId}"></div>
                    <button type="button" class="btn-add-table" onclick="addDrillColumn('${rowId}')">+</button>
                    <div class="t-totals-box"><span class="t-totals-lbl">HOLES</span><span class="t-holes" style="font-weight:bold; color:var(--epi-yellow);">0</span></div>
                    <div class="t-totals-box"><span class="t-totals-lbl">METRES</span><span class="t-metres" style="font-weight:bold; color:#00E676;">0.00</span></div>
                `;
                groupDiv.appendChild(row);
                loadShiftData(rowId, fleet.id, shift);
            }
        });
        container.appendChild(groupDiv);
    });
    document.getElementById('main-area').style.display = 'block';
}
function loadShiftData(rowId, fleetId, shift) {
    const row = document.getElementById(rowId);
    const container = document.getElementById(`drills-${rowId}`);

    if (!row || !container) {
        setTimeout(() => loadShiftData(rowId, fleetId, shift), 50);
        return;
    }

    container.innerHTML = "";
    row.classList.remove('row-loaded');
    
    const date = document.getElementById('date').value;
    const recordId = `${fleetId}_${date}_${shift}`;
    const savedRow = savedDPRData ? savedDPRData.find(r => r[0] === recordId) : null;

    if (savedRow) {
        row.classList.add('row-loaded');
        const locInput = row.querySelector('.f-loc');
        const statusSelect = row.querySelector('.f-status');
        if (locInput) locInput.value = savedRow[7] || "";
        if (statusSelect) statusSelect.value = savedRow[8] || "";

        const holeMapReverse = {
            11: "Face Drilling - 4.3/45mm", 15: "Face Drilling - 4.9/45mm", 19: "Face Drilling - 5.5/48mm",
            23: "Rock bolt Drilling -2.8/ 33mm", 27: "Rock bolt Drilling -2.1/ 33mm", 31: "Production Drilling",
            35: "Reaming - 4.3/102mm", 39: "Reaming - 4.9/102mm", 43: "Reaming - 5.5/102mm",
            47: "Split Set Drilling - 2.8/ 33", 51: "Split Set Drilling - 2.1/ 33", 55: "Scaling - 10 /64"
        };

        let blocksAdded = 0;
        Object.keys(holeMapReverse).forEach(idx => {
            let i = parseInt(idx);
            let dia = savedRow[i], count = savedRow[i + 1], depth = savedRow[i + 2], metres = savedRow[i + 3];

            if (count > 0 || metres > 0) {
                addDrillColumn(rowId);
                blocksAdded++;
                const blocks = container.querySelectorAll('.t-drill-block');
                const newBlock = blocks[blocks.length - 1];
                if (newBlock) {
                    newBlock.querySelector('.d-cat').value = holeMapReverse[i];
                    newBlock.querySelector('.d-dia').value = dia || "";
                    newBlock.querySelector('.d-qty').value = count || 0;
                    newBlock.querySelector('.d-depth').value = depth || 0;
                    newBlock.querySelector('.d-metres').value = metres || 0;
                }
            }
        });
        if (blocksAdded === 0) addDrillColumn(rowId);
    } else {
        addDrillColumn(rowId); 
    }
    updateFleetTotals(rowId);
}
function addDrillColumn(rowId) {
    let optionsHTML = '<option value="">-- Select Type --</option>';
    globalHoleTypes.forEach(h => {
        optionsHTML += `<option value="${h.type}">${h.type}</option>`;
    });

    const container = document.getElementById(`drills-${rowId}`);
    const block = document.createElement('div');
    block.className = "t-drill-block";
    
    block.innerHTML = `
        <select class="d-cat" onchange="applyHoleDefaults(this, '${rowId}')">${optionsHTML}</select>
        <input type="number" class="d-dia" placeholder="Dia" readonly>
        <input type="number" class="d-depth" placeholder="Dpth" oninput="updateFleetTotals('${rowId}')">
        <input type="number" class="d-qty" placeholder="Qty" oninput="updateFleetTotals('${rowId}')">
        <input type="number" class="d-metres" placeholder="Tot M" readonly>
        <button type="button" class="btn-del-table" onclick="removeColumn(this, '${rowId}')" title="Remove">X</button>
    `;
    container.appendChild(block);
}

function applyHoleDefaults(selectElem, rowId) {
    const block = selectElem.closest('.t-drill-block');
    const typeVal = selectElem.value;
    const mapping = globalHoleTypes.find(h => h.type === typeVal);
    
    if (mapping) {
        block.querySelector('.d-dia').value = mapping.dia;
        block.querySelector('.d-depth').value = mapping.depth;
    } else {
        block.querySelector('.d-dia').value = "";
        block.querySelector('.d-depth').value = "";
    }
    updateFleetTotals(rowId);
}

function removeColumn(btnElement, rowId) {
    btnElement.parentElement.remove();
    updateFleetTotals(rowId);
}

function updateFleetTotals(rowId) {
    const row = document.getElementById(rowId);
    let totalHoles = 0; 
    let totalMetres = 0;

    row.querySelectorAll('.t-drill-block').forEach(col => {
        const depth = parseFloat(col.querySelector('.d-depth').value) || 0;
        const qty = parseFloat(col.querySelector('.d-qty').value) || 0;
        const metresField = col.querySelector('.d-metres');
        
        if (depth > 0 && qty > 0) {
            const m = depth * qty;
            metresField.value = m.toFixed(2);
            totalHoles += qty; 
            totalMetres += m;
        } else { 
            metresField.value = ""; 
        }
    });

    row.querySelector('.t-holes').innerText = totalHoles;
    row.querySelector('.t-metres').innerText = totalMetres.toFixed(2);
}

function reviewData() {
    pendingPayload = []; 

    const dateVal = document.getElementById('date').value;
    const custVal = document.getElementById('cust').value;
    const siteVal = document.getElementById('site').value;
    const userVal = document.getElementById('user').value;

    const summaryBody = document.getElementById('summaryBody');
    summaryBody.innerHTML = "";

    // Gathers data from ALL shifts, whether they are folded or unfolded!
    document.querySelectorAll('.t-row').forEach(row => {
        const fleetId = row.dataset.fleet;
        const shift = row.dataset.shift;
        const loc = row.querySelector('.f-loc').value;
        const status = row.querySelector('.f-status').value;

        const drillRows = row.querySelectorAll('.t-drill-block');
        
        if (drillRows.length === 0 && status) {
            pushToPayload(fleetId, shift, loc, status, null, 0, 0);
        }

        drillRows.forEach(col => {
            const type = col.querySelector('.d-cat').value;
            const count = parseFloat(col.querySelector('.d-qty').value) || 0;
            const metres = parseFloat(col.querySelector('.d-metres').value) || 0;

            if (type && count > 0) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color: var(--epi-yellow); font-weight: bold;">${fleetId}<br><span style="color:#aaa; font-size:0.7rem;">Shift ${shift}</span></td>
                    <td style="font-size:0.75rem;">${type}</td>
                    <td>${status || "N/A"}</td>
                    <td style="font-weight: bold;">${count}</td>
                    <td style="color: #00E676; font-weight: bold;">${metres.toFixed(2)} M</td>
                `;
                summaryBody.appendChild(tr);

                pendingPayload.push({
                    date: dateVal, customer: custVal, site: siteVal, fleet: fleetId,
                    shift: shift, user: userVal, status: status, shiftHours: 8, location: loc,
                    drilling: [{
                        type: type,
                        dia: parseFloat(col.querySelector('.d-dia').value) || 0,
                        count: count,
                        depth: parseFloat(col.querySelector('.d-depth').value) || 0,
                        metres: metres
                    }],
                    totalMetres: metres,
                    totalHoles: count
                });
            }
        });
    });

    if (pendingPayload.length === 0) return alert("No valid drilling data found to review.");
    document.getElementById('confirmModal').style.display = 'flex';
}

function pushToPayload(fleet, shift, loc, status, drill, holes, m) {
    pendingPayload.push({
        date: document.getElementById('date').value,
        customer: document.getElementById('cust').value,
        site: document.getElementById('site').value,
        fleet: fleet, shift: shift, user: document.getElementById('user').value,
        status: status, shiftHours: 8, location: loc,
        drilling: drill ? [drill] : [],
        totalMetres: m, totalHoles: holes
    });
}

async function executeSubmission() {
    document.getElementById('confirmModal').style.display = 'none';
    const btn = document.getElementById('finalSubmitBtn');
    btn.disabled = true;
    
    document.getElementById('loader').style.display = 'flex';
    document.getElementById('load-text').innerText = "Uploading to Database...";

    const res = await callServer({ action: "submitPerformance", data: pendingPayload });
    
    document.getElementById('loader').style.display = 'none';
    btn.disabled = false;
    
    if (res.status === "SUCCESS") {
        alert("✅ Success! " + res.message);
        document.getElementById('main-area').style.display = 'none'; 
        pendingPayload = []; 
    } else { 
        alert("❌ Error: " + res.message); 
    }
}
</script>
</body>
</html>
