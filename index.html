<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDT DPR ENTRY FORM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    :root { --epi-black: #000; --epi-yellow: #FFCE00; --bg: #0c0c0c; --card: #181818; --text: #fff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }

    header { background-color: #1a1a1a; padding: 10px 20px; border-bottom: 3px solid var(--epi-yellow); }
    .header-container { display: flex; align-items: center; justify-content: space-between; max-width: 1200px; margin: 0 auto; }
    .logo-wrapper { height: 40px; width: 120px; display: flex; align-items: center; }
    .logo { max-height: 40px; max-width: 100%; object-fit: contain; }
    .header-title { color: #ffffff; font-size: 1.5rem; font-weight: bold; text-transform: uppercase; text-align: center; flex-grow: 1; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

    .control-bar { background: #111; padding: 15px 20px; display: grid; gap: 12px; border-bottom: 1px solid #222; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); align-items: end; }
    .item { display: flex; flex-direction: column; gap: 4px; }
    .item label { font-size: 0.65rem; font-weight: 800; color: var(--epi-yellow); text-transform: uppercase; }
    .item select, .item input { background: #262626; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; font-size: 0.85rem; width: 100%; outline: none; }
    .item select:focus, .item input:focus { border-color: var(--epi-yellow); }

    .sync-btn { background: var(--epi-yellow); color: #000; border: none; padding: 10px; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
    .sync-btn:hover { background: #e6b800; }

    main { padding: 25px 20px; max-width: 98vw; margin: 0 auto; display: none; }
    
    .table-wrapper { overflow-x: auto; background: var(--card); border: 1px solid #333; border-radius: 6px; margin-bottom: 20px; }
    #fleet-container { min-width: max-content; }
    
    .t-header-row { display: flex; gap: 8px; padding: 10px; background: #222; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: #aaa; border-bottom: 2px solid var(--epi-yellow); position: sticky; top: 0; z-index: 10; }
    .t-row { display: flex; gap: 8px; padding: 8px 10px; border-bottom: 1px solid #222; align-items: stretch; background: #111; }
    .t-row:hover { background: #1a1a1a; }

    .t-fleet { width: 180px; flex-shrink: 0; display: flex; align-items: center; font-weight: bold; color: var(--epi-yellow); font-size: 0.9rem; border-right: 1px solid #333; padding-right: 10px; }
    .t-shift { width: 100px; flex-shrink: 0; }
    .t-loc { width: 140px; flex-shrink: 0; }
    .t-status { width: 120px; flex-shrink: 0; border-right: 1px dashed #333; padding-right: 10px; }

    .t-row input, .t-row select { background: #000; color: #fff; border: 1px solid #444; padding: 6px; font-size: 0.8rem; border-radius: 3px; width: 100%; outline: none; }
    .t-row input:focus, .t-row select:focus { border-color: var(--epi-yellow); }
    .t-row input[readonly] { background: #1a1a1a; color: var(--epi-yellow); border-color: #333; font-weight: bold; }

    .t-drills { display: flex; gap: 5px; }
    .t-drill-block { display: flex; gap: 4px; align-items: center; background: #000; padding: 4px; border: 1px solid #333; border-radius: 4px; }
    
    .t-drill-block select.d-cat { width: 110px; }
    .t-drill-block select.d-dia { width: 70px; }
    .t-drill-block input.d-depth { width: 60px; }
    .t-drill-block input.d-qty { width: 55px; }
    .t-drill-block input.d-metres { width: 70px; }

    .btn-del-table { background: #444; color: #fff; border: none; padding: 6px 10px; border-radius: 3px; cursor: pointer; margin-left: 2px; }
    .btn-del-table:hover { background: #ff4444; }

    .btn-add-table { background: #222; color: var(--epi-yellow); border: 1px dashed var(--epi-yellow); padding: 0 15px; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold; display: flex; align-items: center; justify-content: center; margin-left: 5px; }
    .btn-add-table:hover { background: #333; }

    .primary-btn { background: var(--epi-yellow); color: #000; border: none; padding: 15px; border-radius: 6px; font-weight: 900; font-size: 1rem; cursor: pointer; width: 100%; max-width: 400px; margin: 20px auto; display: block; text-transform: uppercase; }
    
    .table-wrapper::-webkit-scrollbar { height: 10px; }
    .table-wrapper::-webkit-scrollbar-track { background: #111; }
    .table-wrapper::-webkit-scrollbar-thumb { background: #444; border-radius: 5px; }
    .table-wrapper::-webkit-scrollbar-thumb:hover { background: var(--epi-yellow); }

    #loader { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: var(--epi-yellow); font-weight: bold; font-size: 1.2rem; }
</style>
</head>
<body onload="initApp()">

<div id="loader"><i class="fas fa-spinner fa-spin fa-2x" style="margin-bottom: 15px;"></i> Loading Initial Data...</div>

<header>
    <div class="header-container">
        <div class="logo-wrapper"><img src="RDT.png" class="logo" alt="RDT"></div>
        <div class="header-title">RDT DPR ENTRY FORM</div>
        <div class="logo-wrapper"><img src="Boomer1.png" class="logo" alt="Boomer"></div>
    </div>
</header>

<div class="control-bar">
    <div class="item"><label>Customer</label><select id="cust" onchange="updateSites()"><option value="">Loading...</option></select></div>
    <div class="item"><label>Work Site</label><select id="site"><option value="">Select</option></select></div>
    <div class="item"><label>Date</label><input type="date" id="date"></div>
    <div class="item"><label>Login ID</label><input type="text" id="user" placeholder="Admin"></div>
    <div class="item"><label>Password</label><input type="password" id="pass" placeholder="••••"></div>
    <div class="item"><button class="sync-btn" onclick="handleSync()"><i class="fas fa-sync" id="icon"></i> SYNC SITE</button></div>
</div>

<main id="main-area">
    <div class="table-wrapper">
        <div id="fleet-container">
            </div>
    </div>
    <button type="button" id="submit-btn" class="primary-btn" onclick="submitData()">SUBMIT ALL DATA</button>
</main>

<script>
let dbHierarchy = {};
let activeFleets = []; 

// 🚨 PASTE YOUR DEPLOYED GOOGLE APP SCRIPT URL HERE 🚨
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzLPst6bC2JxlF93mI04Lwt8YF18qSw2KRfzNgmT5XsqMEZ9VuC-5FbHJUjouks_HaqaA/exec";

async function callServer(data) {
    try {
        const response = await fetch(WEB_APP_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(data) });
        const textResponse = await response.text(); 
        try { return JSON.parse(textResponse); } 
        catch (e) { return { status: "ERROR", message: "Server returned invalid data." }; }
    } catch (error) { return { status: "ERROR", message: "Network connection failed." }; }
}

async function initApp() {
    document.getElementById('date').valueAsDate = new Date();
    const res = await callServer({ action: "getInitialHierarchy" });
    document.getElementById('loader').style.display = 'none';
    if (res.status === "SUCCESS") {
        dbHierarchy = res.data;
        const custSelect = document.getElementById('cust');
        custSelect.innerHTML = '<option value="">-- Select Customer --</option>'; 
        Object.keys(dbHierarchy).sort().forEach(c => custSelect.options.add(new Option(c, c)));
    }
}

function updateSites() {
    const s = document.getElementById('site');
    s.innerHTML = '<option value="">Select Site</option>';
    const cust = document.getElementById('cust').value;
    if(dbHierarchy[cust]) dbHierarchy[cust].sort().forEach(site => s.options.add(new Option(site, site)));
}

async function handleSync() {
    const icon = document.getElementById('icon');
    try {
        const u = document.getElementById('user').value, p = document.getElementById('pass').value;
        const s = document.getElementById('site').value, c = document.getElementById('cust').value;
        
        if(!u || !p || !s || !c) return alert("Please fill Customer, Site, and Login credentials.");
        icon.classList.add('fa-spin');
        
        const res = await callServer({ action: "login", site: s, user: u, pass: p });
        icon.classList.remove('fa-spin');

        if(res.status === "SUCCESS") {
            activeFleets = res.fleets || [];
            buildFleetDashboard();
        } else { alert("Sync Error: " + res.message); }
    } catch (err) {
        if(icon) icon.classList.remove('fa-spin');
        alert("UI Error: " + err.message);
    }
}

function buildFleetDashboard() {
    const container = document.getElementById('fleet-container');
    container.innerHTML = ""; 

    if (activeFleets.length === 0) {
        container.innerHTML = "<h3 style='color:#ff4444; padding:20px;'>No machines assigned to this site.</h3>";
        return;
    }

    const headerRow = document.createElement('div');
    headerRow.className = "t-header-row";
    headerRow.innerHTML = `
        <div class="t-fleet">Fleet Asset</div>
        <div class="t-shift">Shift</div>
        <div class="t-loc">Location</div>
        <div class="t-status">Status</div>
        <div style="padding-left:5px;">Drilling Data <span style="color:#666; text-transform:none;">(Type, Dia, Depth, Qty, Total)</span></div>
    `;
    container.appendChild(headerRow);

    activeFleets.forEach(fleet => {
        const shiftOpts = fleet.shifts ? fleet.shifts.split(',').map(s => `<option value="${s.trim()}">${s.trim()}</option>`).join('') : '';
        const locOpts = fleet.locations ? fleet.locations.split(',').map(l => `<option value="${l.trim()}">`).join('') : '';
        const statusOpts = fleet.statuses ? fleet.statuses.split(',').map(s => `<option value="${s.trim()}">${s.trim()}</option>`).join('') : '<option value="Operative">Operative</option><option value="Non-Operative">Non-Operative</option>';

        const row = document.createElement('div');
        row.className = "t-row";
        row.id = "fleet-" + fleet.id;
        
        row.innerHTML = `
            <div class="t-fleet">${fleet.id}</div>
            <div class="t-shift"><select class="f-shift"><option value="">Select</option>${shiftOpts}</select></div>
            <div class="t-loc">
                <input list="locs-${fleet.id}" class="f-loc" placeholder="Select or Type">
                <datalist id="locs-${fleet.id}">${locOpts}</datalist>
            </div>
            <div class="t-status">
                <select class="f-status"><option value="">- Status -</option>${statusOpts}</select>
            </div>
            
            <div class="t-drills" id="drills-${fleet.id}"></div>
            <button type="button" class="btn-add-table" onclick="addDrillColumn('${fleet.id}')" title="Add Drilling Type">+</button>
            
            <div class="t-totals" style="display:none;">
                <span class="t-holes">0</span>
                <span class="t-metres">0</span>
            </div>
        `;
        container.appendChild(row);
        
        addDrillColumn(fleet.id);
    });

    document.getElementById('main-area').style.display = 'block';
}

function addDrillColumn(fleetId) {
    const fleet = activeFleets.find(f => f.id === fleetId);
    if (!fleet) return;

    const drillCategories = [
        '<option value="face">Face</option>',
        '<option value="rockbolt">Rockbolt</option>',
        '<option value="prod">Production</option>',
        '<option value="ream">Reaming</option>',
        '<option value="splitset">Splitset</option>'
    ].join('');

    const diaOpts = fleet.dias ? fleet.dias.split(',').map(d => `<option value="${d.trim()}">${d.trim()}</option>`).join('') : '';

    const container = document.getElementById(`drills-${fleetId}`);
    const block = document.createElement('div');
    block.className = "t-drill-block";
    
    block.innerHTML = `
        <select class="d-cat"><option value="">Type</option>${drillCategories}</select>
        <select class="d-dia"><option value="">Dia</option>${diaOpts}</select>
        <input type="number" class="d-depth" placeholder="Dpth" oninput="updateFleetTotals('${fleetId}')">
        <input type="number" class="d-qty" placeholder="Qty" oninput="updateFleetTotals('${fleetId}')">
        <input type="number" class="d-metres" placeholder="Tot M" readonly>
        <button type="button" class="btn-del-table" onclick="removeColumn(this, '${fleetId}')" title="Remove">X</button>
    `;
    
    container.appendChild(block);
}

function removeColumn(btnElement, fleetId) {
    btnElement.parentElement.remove();
    updateFleetTotals(fleetId);
}

function updateFleetTotals(fleetId) {
    const row = document.getElementById(`fleet-${fleetId}`);
    let totalHoles = 0;
    let totalMetres = 0;

    row.querySelectorAll('.t-drill-block').forEach(col => {
        const depth = parseFloat(col.querySelector('.d-depth').value) || 0;
        const qty = parseFloat(col.querySelector('.d-qty').value) || 0;
        const metresField = col.querySelector('.d-metres');
        
        if (depth > 0 && qty > 0) {
            const m = depth * qty;
            metresField.value = m.toFixed(2);
            totalHoles += qty;
            totalMetres += m;
        } else {
            metresField.value = "";
        }
    });

    row.querySelector('.t-holes').innerText = totalHoles;
    row.querySelector('.t-metres').innerText = totalMetres.toFixed(2);
}

function extractSpread(row) {
    let spread = {
        face: { dia: [], count: 0, depth: [], metres: 0 },
        rockbolt: { dia: [], count: 0, depth: [], metres: 0 },
        prod: { dia: [], count: 0, depth: [], metres: 0 },
        ream: { dia: [], count: 0, depth: [], metres: 0 },
        splitset: { dia: [], count: 0, depth: [], metres: 0 }
    };

    row.querySelectorAll('.t-drill-block').forEach(col => {
        const cat = col.querySelector('.d-cat').value;
        const dia = col.querySelector('.d-dia').value;
        const count = parseFloat(col.querySelector('.d-qty').value) || 0;
        const depth = parseFloat(col.querySelector('.d-depth').value) || 0;
        const metres = count * depth;

        if (!cat || count === 0) return;

        let target = spread[cat]; 
        if (target) {
            if (dia && !target.dia.includes(dia)) target.dia.push(dia);
            if (depth > 0 && !target.depth.includes(depth)) target.depth.push(depth);
            target.count += count;
            target.metres += metres;
        }
    });

    Object.keys(spread).forEach(k => {
        spread[k].dia = spread[k].dia.join(',');
        spread[k].depth = spread[k].depth.join(',');
        spread[k].metres = spread[k].metres > 0 ? spread[k].metres.toFixed(2) : "";
        spread[k].count = spread[k].count > 0 ? spread[k].count : "";
    });

    return spread;
}

async function submitData() {
    const payload = {
        date: document.getElementById('date').value,
        cust: document.getElementById('cust').value,
        site: document.getElementById('site').value,
        user: document.getElementById('user').value,
        entries: []
    };

    document.querySelectorAll('.t-row').forEach(row => {
        const fleetId = row.id.replace("fleet-", "");
        const shift = row.querySelector('.f-shift').value;
        const loc = row.querySelector('.f-loc').value;
        const status = row.querySelector('.f-status').value;
        const totalHoles = parseFloat(row.querySelector('.t-holes').innerText) || 0;
        const totalMetres = parseFloat(row.querySelector('.t-metres').innerText) || 0;

        // Submits if they entered Holes OR if they just selected a Shift and Status (e.g., Non-Operative, 0 drilling)
        if (totalHoles > 0 || status) {
            payload.entries.push({
                fleetId, shift, loc, status,
                totalHoles, totalMetres,
                spread: extractSpread(row)
            });
        }
    });

    if (payload.entries.length === 0) return alert("No valid data entered. Fill values before submitting.");

    const btn = document.getElementById('submit-btn');
    btn.innerHTML = 'SUBMITTING...'; btn.disabled = true;

    const res = await callServer({ action: "submitPerformance", data: payload });
    
    btn.innerHTML = 'SUBMIT ALL DATA'; btn.disabled = false;
    
    if (res.status === "SUCCESS") {
        alert("✅ Success! " + res.message);
        document.getElementById('main-area').style.display = 'none'; 
    } else { alert("❌ Error: " + res.message); }
}
</script>
</body>
</html>
